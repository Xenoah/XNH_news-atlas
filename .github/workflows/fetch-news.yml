name: Fetch News Data

# Run every hour and allow manual trigger
on:
  schedule:
    - cron: '0 * * * *'       # Every hour at :00 UTC (~72 min/day, safe for free tier)
    # - cron: '*/30 * * * *'  # Every 30 min (~144 min/day) — enable if on paid plan
  workflow_dispatch:            # Manual trigger from GitHub Actions UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-news:
    name: Fetch & commit news data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone, faster

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news data from GDELT
        run: python scripts/fetch-news.py

      - name: Check for data changes
        id: check_changes
        run: |
          git diff --quiet data/ \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: auto-update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
